apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-deployment
  labels:
    app: portfolio-ricardo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-ricardo
  template:
    metadata:
      labels:
        app: portfolio-ricardo
    spec:
      containers:
        - name: web
          # Aquí ya está configurada tu imagen exacta:
          image: ghcr.io/ricardojch10/portfolio-ricardo-chi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
spec:
  type: ClusterIP
  selector:
    app: portfolio-ricardo
  ports:
    - port: 80
      targetPort: 80
